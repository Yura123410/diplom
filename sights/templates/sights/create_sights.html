{% extends 'sights/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card" style="background: rgba(255,255,255,0.95); padding: 2rem; border-radius: 15px;">
            <h2 class="mb-4" style="color: #1a252f; font-weight: 700;">Добавить достопримечательность</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                {% for field in form %}
                <div class="form-group mb-3">
                    <label for="{{ field.id_for_label }}" style="font-weight: 500; color: #333;">
                        {{ field.label }}
                        {% if field.field.required %}<span style="color: red;">*</span>{% endif %}
                    </label>
                    {{ field }}
                    {% if field.help_text %}
                    <small class="form-text text-muted">{{ field.help_text }}</small>
                    {% endif %}
                    {% for error in field.errors %}
                    <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}

                <div class="mt-4">
                    <button type="submit" class="btn" style="background: #667eea; color: white; padding: 8px 25px; border-radius: 25px; border: none; transition: all 0.3s ease;">Сохранить</button>
                    <a href="{% url 'sights:sight_list' %}" class="btn" style="background: #6c757d; color: white; padding: 8px 25px; border-radius: 25px; text-decoration: none; transition: all 0.3s ease;">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        transition: border-color 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .btn:hover {
        transform: translateY(-2px);
    }
</style>
{% endblock %}
