<div class="col-md-4 d-flex align-items-stretch">
    <div class="card mb-4 box-shadow w-100">
        <div class="card-body d-flex flex-column">
            <h5 class="card-title">{{ object.name }}</h5>
            <p class="card-text flex-grow-1">{{ object.description|default:"Описание отсутствует" }}</p>
            <div class="d-flex justify-content-between align-items-center mt-auto">
                <div class="btn-group">
                    <a href="{% url 'sights:category' object.pk %}"
                       class="btn btn-primary"
                       role="button">
                       Смотреть
                    </a>
                </div>
                <small class="text-muted">{{ object.sights.count }} мест</small>
            </div>
        </div>
    </div>
</div>
