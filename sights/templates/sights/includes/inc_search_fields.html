<form action="{% url 'sights:all_search' %}" method="get" class="mb-4">
    <div class="input-group shadow-sm">
        <input
            name="q"
            type="text"
            class="form-control form-control-lg"
            placeholder="Поиск..."
            value="{{ request.GET.q|default:'' }}"
            style="border-radius: 50px 0 0 50px; border-right: none;"
        >
        <div class="input-group-append">
            <button
                type="submit"
                class="btn btn-primary btn-lg"
                style="border-radius: 0 50px 50px 0; background: #667eea; border-color: #667eea;"
            >
                Найти
            </button>
        </div>
    </div>
</form>
